<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - The Devotion Code</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #FFFFFF;
      color: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .thank-you-container {
      max-width: 760px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: clamp(36px, 6vw, 58px);
      line-height: 1.1;
      font-weight: 800;
      margin-bottom: 24px;
      color: #111111;
    }

    .subheadline {
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.4;
      font-weight: 400;
      color: #333333;
      margin-bottom: 42px;
    }

    .email-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .logo-card {
      width: 120px;
      height: 120px;
      border: 1px solid #EEEEEE;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #FFFFFF;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .logo-card svg {
      width: 70px;
      height: 70px;
    }

    @media (max-width: 480px) {
      .email-logos {
        gap: 18px;
      }

      .logo-card {
        width: 96px;
        height: 96px;
        border-radius: 14px;
      }

      .logo-card svg {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <main class="thank-you-container">
    <h1>Congratulations on purchasing The Devotion Code program.</h1>

    <p class="subheadline">
      To access your program, simply check your email inbox.
    </p>

    <div class="email-logos" aria-label="Email providers">
      <!-- Outlook -->
      <div class="logo-card">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Outlook">
          <rect x="19" y="12" width="27" height="25" rx="2" fill="#FFFFFF" stroke="#0F6CBD" stroke-width="1.6"/>
          <path d="M19.5 15.5 L32.5 25 L45.5 15.5" fill="none" stroke="#0F6CBD" stroke-width="2.4" stroke-linejoin="round"/>
          <rect x="2" y="8" width="27" height="32" rx="5" fill="#0F6CBD"/>
          <text x="15.5" y="31.5" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">O</text>
        </svg>
      </div>

      <!-- Gmail -->
      <div class="logo-card">
        <svg viewBox="0 0 49 37" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gmail">
          <path fill="#4285F4" d="M3.27 36.75h7.91V17.59L0 9.16v24.31a3.27 3.27 0 0 0 3.27 3.28Z"/>
          <path fill="#34A853" d="M37.81 36.75h7.91A3.27 3.27 0 0 0 49 33.47V9.16l-11.19 8.43Z"/>
          <path fill="#FBBC04" d="M37.81 3.53v14.06L49 9.16V5.16c0-4.05-4.62-6.36-7.86-3.93Z"/>
          <path fill="#EA4335" d="M11.18 17.59V3.53L24.5 13.52 37.81 3.53v14.06L24.5 27.58Z"/>
          <path fill="#C5221F" d="M0 5.16v4l11.18 8.43V3.53L7.86 1.23C4.62-1.2 0 1.11 0 5.16Z"/>
        </svg>
      </div>

      <!-- Yahoo -->
      <div class="logo-card">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yahoo">
          <rect width="48" height="48" rx="11" fill="#6001D2"/>
          <path fill="#FFFFFF" d="M10 14h6.6l4.3 8.9 4.4-8.9H32l-8.2 15.7V38h-5.7v-8.3Z"/>
          <circle cx="33.5" cy="31.5" r="3.4" fill="#FFFFFF"/>
          <path fill="#FFFFFF" d="M33.2 13h6.3l-2.6 12.3h-3.4Z"/>
        </svg>
      </div>
    </div>
  </main>
</body>
</html>
